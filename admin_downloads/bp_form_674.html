<script>
	$(function() {
		var fileTarget = $('.filebox .upload-hidden');
		fileTarget.on('change', function(i) {
			if (window.FileReader) {
				var filename = $(this)[0].files[0].name;
			} else {
				var filename = $(this).val().split('/').pop().split('\\').pop();
			}
			$(this).siblings('.upload-name').val(filename);
		});
		$("input:radio[name=order_recept_method]").click(function() {
			ChkReceptMethod();
		});
		ChkReceptMethod();
	});

	function ChkReceptMethod() {
		var val = $(":input:radio[name=order_recept_method]:checked").val();
		$("#kakaoHp").hide();
		if (val == "kakao" || val == "all") {
			$("#kakaoHp").show();
		}
	}
</script>
